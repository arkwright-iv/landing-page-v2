<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Second project in TOP, a product landing page following a briefing.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Modern+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Odin Landing Page</title>
  </head>
  <body>
    <header>
      <div id="nav-wrapper">
      <img id="logo" src="./assets/logo.png" alt="A red viking shield as the page logo.">
      <nav>
        <ul>
          <li><a href="#hero">raids</a></li>
          <li><a href="#product-showcase">valhalla</a></li>
          <li><a href="#main-quote">ship building</a></li>
        </ul>
      </nav>
      </div>
    </header>
    
    <main>
      <section id="hero">
        <div id="hero-wrapper">
          <div id="sign-up-ctn">
            <h1>Become a Viking today!</h1>
            <p>We are the strongest army in Europe, we raid, we pillage, we hold awesome feasts with mead and good music, we offer free training on martial arts and axe throwing? What are you waiting for? Sign up today!</p>
            <button type="button">sign up</button>
          </div>
          <div id="hero-img-ctn">
            <img src="assets/floki-crown.jpg" alt="A viking soldier with a bloodied face, Floki, holding a king's crown.">
          </div>
        </div>
      </section>
      <section id="product-showcase"></section>
      <section id="main-quote"></section>
      <section id="cta"></section>
    </main>
    <footer>
      <address>Copyright © Arkwright 2026</address>
    </footer>
  </body>
</html>
